# AprilTag 기반 yaw 교정 설정
# nav_core.py에서 Nav2 이동 중 태그가 보이면 /initialpose 발행
#
# TODO: 실제 배치 후 tags 섹션의 yaw 값을 실측값으로 교체

camera:
  fx: 570.34
  fy: 570.34
  cx: 320.0
  cy: 240.0

tag_size: 0.05  # 태그 한 변 길이 (미터)

correction:
  max_detect_dist: 0.3   # 태그까지 거리 상한 (미터) — 이 거리 이내일 때만 교정
  max_angle_deg:   10.0  # 태그 정면 기준 허용 각도 (도) — 비스듬히 보일 때 스킵
  cooldown_sec:    10.0  # 교정 후 재교정 최소 대기 시간 (초)

# tag_id: map 기준으로 태그가 바라보는 방향 (yaw, radians)
tags:
  13:
    yaw: 2.812   # ≈ 161.1도
  16:
    yaw: 4.709   # ≈ 269.8도
  17:
    yaw: 3.105   # ≈ 177.9도
